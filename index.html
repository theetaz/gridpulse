<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!--
      viewport-fit=cover lets us read env(safe-area-inset-*) so the
      bottom nav clears iOS/Android browser toolbars. We leave pinch-zoom
      enabled (no maximum-scale / user-scalable=no) for accessibility;
      input auto-zoom is prevented in CSS by keeping input font-size 16px.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GridPulse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>GridPulse — Power Outage Tracker for Sri Lanka</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
