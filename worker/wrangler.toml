# [[queues.consumers]]
# queue = "push-notifications"
# max_batch_size = 100
# max_batch_timeout = 30

# Secrets (set via `wrangler secret put <NAME>`):
#   VAPID_PUBLIC_KEY
#   VAPID_PRIVATE_KEY
#   CEB_USERNAME       (optional, for authenticated CEB endpoints)
#   CEB_PASSWORD       (optional)
